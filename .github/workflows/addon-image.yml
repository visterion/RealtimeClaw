name: Build Addon Image

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "addon/**"
      - "package*.json"
      - "tsconfig.json"
      - "Dockerfile"
      - ".github/workflows/addon-image.yml"

env:
  REGISTRY: ghcr.io
  IMAGE_BASE: ghcr.io/ufelmann/realtimeclaw-addon

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - platform: linux/amd64
            tag_suffix: amd64
          - platform: linux/aarch64
            tag_suffix: aarch64

    steps:
      - uses: actions/checkout@v6

      - name: Read addon version
        id: version
        run: |
          VERSION=$(grep '^version:' addon/config.yaml | awk '{print $2}')
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: addon/Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          tags: |
            ${{ env.IMAGE_BASE }}-${{ matrix.tag_suffix }}:${{ steps.version.outputs.value }}
            ${{ env.IMAGE_BASE }}-${{ matrix.tag_suffix }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
